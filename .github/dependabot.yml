version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown: "1 day"
    groups:
      cargo:
        update-types:
          - "major"
          - "minor"
          - "patch"
    dependency-type: "all"
  - package-ecosystem: "rust-toolchain"
    directory: "/"
    schedule:
      interval: "weekly"
